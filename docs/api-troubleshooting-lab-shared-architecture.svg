<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="520" viewBox="0 0 1400 520">
  <defs>
    <style>
      .bg { fill: #0f172a; }
      .panel { fill: #111827; stroke: #334155; stroke-width: 2; rx: 18; ry: 18; }
      .title { fill: #f8fafc; font-family: Arial, Helvetica, sans-serif; font-size: 30px; font-weight: 700; }
      .subtitle { fill: #cbd5e1; font-family: Arial, Helvetica, sans-serif; font-size: 18px; }
      .boxTitle { fill: #f8fafc; font-family: Arial, Helvetica, sans-serif; font-size: 24px; font-weight: 700; }
      .boxText { fill: #cbd5e1; font-family: Arial, Helvetica, sans-serif; font-size: 17px; }
      .label { fill: #93c5fd; font-family: Arial, Helvetica, sans-serif; font-size: 16px; font-weight: 700; }
      .repo { fill: #a7f3d0; font-family: Arial, Helvetica, sans-serif; font-size: 15px; font-weight: 700; }
      .arrow { stroke: #60a5fa; stroke-width: 4; fill: none; marker-end: url(#arrowhead); }
      .smallArrow { stroke: #94a3b8; stroke-width: 3; fill: none; marker-end: url(#arrowhead2); }
      .note { fill: #1e293b; stroke: #475569; stroke-width: 1.5; rx: 12; ry: 12; }
      .noteText { fill: #e2e8f0; font-family: Arial, Helvetica, sans-serif; font-size: 15px; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#60a5fa"/>
    </marker>
    <marker id="arrowhead2" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <polygon points="0 0, 9 4.5, 0 9" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="520"/>

  <text class="title" x="60" y="62">API Troubleshooting Lab Series</text>
  <text class="subtitle" x="60" y="94">Shared architecture for the gateway and backend repositories</text>

  <rect class="panel" x="70" y="145" width="280" height="180"/>
  <text class="boxTitle" x="210" y="205" text-anchor="middle">Client</text>
  <text class="boxText" x="210" y="242" text-anchor="middle">Postman</text>
  <text class="boxText" x="210" y="272" text-anchor="middle">curl / scripts</text>
  <text class="boxText" x="210" y="302" text-anchor="middle">manual test requests</text>

  <rect class="panel" x="560" y="125" width="300" height="220"/>
  <text class="boxTitle" x="710" y="180" text-anchor="middle">API Gateway</text>
  <text class="repo" x="710" y="208" text-anchor="middle">api-gateway-troubleshooting-lab</text>
  <text class="boxText" x="710" y="246" text-anchor="middle">authentication</text>
  <text class="boxText" x="710" y="276" text-anchor="middle">rate limiting</text>
  <text class="boxText" x="710" y="306" text-anchor="middle">request ID tracing</text>
  <text class="boxText" x="710" y="336" text-anchor="middle">backend proxying</text>

  <rect class="panel" x="1050" y="125" width="300" height="220"/>
  <text class="boxTitle" x="1200" y="180" text-anchor="middle">Backend API</text>
  <text class="repo" x="1200" y="208" text-anchor="middle">api-integration-troubleshooting-lab</text>
  <text class="boxText" x="1200" y="246" text-anchor="middle">API key validation</text>
  <text class="boxText" x="1200" y="276" text-anchor="middle">XML payload validation</text>
  <text class="boxText" x="1200" y="306" text-anchor="middle">order processing</text>
  <text class="boxText" x="1200" y="336" text-anchor="middle">structured logging</text>

  <line class="arrow" x1="350" y1="235" x2="560" y2="235"/>
  <line class="arrow" x1="860" y1="235" x2="1050" y2="235"/>

  <text class="label" x="455" y="214" text-anchor="middle">HTTP requests</text>
  <text class="label" x="955" y="214" text-anchor="middle">proxied requests</text>

  <rect class="note" x="145" y="385" width="1110" height="85"/>
  <text class="noteText" x="170" y="420">Common troubleshooting scenarios modelled across the platform:</text>
  <text class="noteText" x="170" y="448">401 missing API key • 403 invalid key • 429 rate limit exceeded • 400 malformed XML • 502 backend unavailable • 504 backend timeout</text>
</svg>
